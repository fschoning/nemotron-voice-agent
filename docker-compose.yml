services:
  # 1. The Hearing Engine (Parakeet ASR)
  asr-engine:
    build:
      context: .
      dockerfile: Dockerfile.gb10
    image: nemotron-unified:cuda13-gb10
    container_name: agent-asr
    restart: unless-stopped
    ipc: host
    network_mode: host
    environment:
      - NVIDIA_DISABLE_REQUIRE=1
      - ENABLE_ASR=true
      - ENABLE_TTS=false
      - ENABLE_LLM=false
      - HF_HOME=/root/.cache/huggingface
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    volumes:
      - ./:/workspace
      - ~/.cache/huggingface:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, compute, utility]
    command: ["bash", "/workspace/scripts/start_unified.sh"]

  # 2. The Voice Engine 1 (Magpie TTS)
  tts-engine:
    build:
      context: .
      dockerfile: Dockerfile.isolated
    image: magpie-isolated:latest
    container_name: agent-tts
    restart: unless-stopped
    ipc: host
    network_mode: host
    environment:
      - NVIDIA_DISABLE_REQUIRE=1
      - ENABLE_ASR=false
      - ENABLE_TTS=true
      - ENABLE_LLM=false
      - HF_HOME=/root/.cache/huggingface
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    volumes:
      - ./:/workspace
      - ~/.cache/huggingface:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, compute, utility]
    command: ["bash", "/workspace/scripts/start_unified.sh"]

  # 3. The Voice Engine 2 (Voxtral TTS)
  voxtral-engine:
    build:
      context: .
      dockerfile: Dockerfile.voxtral
    image: voxtral-omni:latest
    container_name: agent-voxtral
    restart: unless-stopped
    ipc: host
    network_mode: host
    environment:
      - HF_HOME=/root/.cache/huggingface
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, compute, utility]
    # CUDA Graphs Enabled (No enforce-eager), 8192 context window
    command: ["mistralai/Voxtral-4B-TTS-2603", "--port", "8002", "--omni", "--dtype", "bfloat16", "--kv-cache-dtype", "fp8", "--max-model-len", "1024", "--max-num-seqs", "2"]

  # 4. The Brain (Pipecat + Gemini)
  agent-core:
    build:
      context: .
      dockerfile: Dockerfile
    image: agent-core-custom:latest
    container_name: agent-core
    restart: always
    ipc: host
    network_mode: host
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - NVIDIA_ASR_URL=ws://127.0.0.1:8080
      - NVIDIA_TTS_URL=http://127.0.0.1:8001
      - VOXTRAL_TTS_URL=http://127.0.0.1:8002/v1
      - ACTIVE_TTS=magpie
      - NVIDIA_DISABLE_REQUIRE=1
    depends_on:
      - asr-engine
      - voxtral-engine
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, compute, utility]
